name: Keep Workflows Alive

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping to stay alive
        run: |
          git config --global user.name 'shahedul-islam-joshi'
          git config --global user.email 'shahedul-islam-joshi@users.noreply.github.com'
          echo "03/15/2026 02:06:01" > .github/keep_alive.txt
          git add .github/keep_alive.txt
          git commit -m "chore: keep workflows alive [skip ci]" || echo "No changes"
          git push origin main
