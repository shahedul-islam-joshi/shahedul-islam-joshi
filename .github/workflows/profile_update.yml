name: Update Profile Time

on:
  schedule:
    - cron: '0 * * * *'    # Every hour is more reliable than every 30 min
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1     # Faster checkout

      - name: Pull latest before editing
        run: git pull origin main --rebase   # ✅ Prevents push conflicts

      - name: Update Last Seen Date (Hidden Tracking)
        run: |
          export TZ="Asia/Dhaka"
          CURRENT_TIME=$(date +'%Y-%m-%d %I:%M %p')
          
          # Create/update hidden tracking file (won't appear in README)
          mkdir -p .github
          echo "Last seen: $CURRENT_TIME (BD Time) 🇧🇩" > .github/last_seen.txt

      - name: Save Changes to GitHub
        run: |
          git config --global user.name 'shahedul-islam-joshi'
          git config --global user.email 'shahedul-islam-joshi@users.noreply.github.com'
          git add .github/last_seen.txt
          git diff --staged --quiet && echo "No changes" && exit 0   # ✅ Cleaner than || echo
          git commit -m "chore: update last seen timestamp [skip ci]"
          git push origin main